name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download ffmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path binaries
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile binaries\ffmpeg.zip
          Expand-Archive -Path binaries\ffmpeg.zip -DestinationPath binaries\ffmpeg_tmp -Force
          Get-ChildItem -Path binaries\ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1 | Copy-Item -Destination binaries\ffmpeg.exe
          Remove-Item -Recurse -Force binaries\ffmpeg_tmp, binaries\ffmpeg.zip

      - name: Download mp4decrypt
        shell: pwsh
        run: |
          $bento4Url = "https://www.bok.net/Bento4/binaries/Bento4-SDK-1-6-0-641.x86_64-microsoft-win32.zip"
          Invoke-WebRequest -Uri $bento4Url -OutFile binaries\bento4.zip
          Expand-Archive -Path binaries\bento4.zip -DestinationPath binaries\bento4_tmp -Force
          Get-ChildItem -Path binaries\bento4_tmp -Recurse -Filter "mp4decrypt.exe" | Select-Object -First 1 | Copy-Item -Destination binaries\mp4decrypt.exe
          Remove-Item -Recurse -Force binaries\bento4_tmp, binaries\bento4.zip

      - name: Verify binaries
        run: |
          dir binaries\*.exe
          binaries\ffmpeg.exe -version 2>&1 | head -1
          binaries\mp4decrypt.exe 2>&1 | head -1
        shell: bash

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -v

      - name: Build EXE with PyInstaller
        run: python -m PyInstaller build/seenshow_dl.spec --noconfirm

      - name: Verify EXE exists
        run: |
          dir dist\SeenShowDL.exe
          $size = (Get-Item dist\SeenShowDL.exe).Length / 1MB
          Write-Host "EXE size: $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeenShowDL-windows
          path: dist/SeenShowDL.exe
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SeenShowDL-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SeenShowDL.exe
          generate_release_notes: true
